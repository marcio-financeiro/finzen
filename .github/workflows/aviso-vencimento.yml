name: Aviso de Vencimento Diário

on:
  schedule:
    - cron: '0 11 * * *'  # 11h UTC = 08h BRT
  workflow_dispatch:        # disparo manual pelo botão "Run workflow" no GitHub

jobs:
  aviso:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verificar e enviar vencimentos
        run: node scripts/aviso-vencimento.js
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
