<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>if(localStorage.getItem("finzen_sidebar_rail")==="collapsed")document.documentElement.classList.add("sidebar-rail");</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - FinZen</title>
<link rel="stylesheet" href="./css/base.css?v=1102">
<link rel="stylesheet" href="./css/layout.css?v=1102">
<link rel="stylesheet" href="./css/components.css?v=1102">
<link rel="stylesheet" href="./css/mobile.css?v=1102">
<link rel="stylesheet" href="./css/editorial.css?v=1102">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#f59e0b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FinZen">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<style>
  /* Fix autofill do Chrome/Safari que deixa fundo branco */
  input:-webkit-autofill,
  input:-webkit-autofill:hover,
  input:-webkit-autofill:focus{
    -webkit-box-shadow:0 0 0 100px var(--surface-2) inset !important;
    -webkit-text-fill-color:#ffffff !important;
    caret-color:#ffffff !important;
    border-color:var(--border) !important;
    transition:background-color 5000s ease-in-out 0s;
  }
  .auth-card input{
    background:var(--surface-2) !important;
    color:#ffffff !important;
    -webkit-text-fill-color:#ffffff !important;
  }
</style>
</head>

<body>
<main class="auth-page">
  <section class="auth-card">
    <div class="brand">
      <span class="brand-mark">FZ</span>
      <div>
        <h1>FinZen</h1>
        <p class="muted">Controle financeiro pessoal</p>
      </div>
    </div>

    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="Sua senha" autocomplete="current-password">
    </div>

    <button type="button" class="btn btn-primary full" id="btnLogin">Entrar</button>
    <button type="button" class="btn btn-secondary full" id="btnCadastro">Cadastrar</button>

    <div id="mensagem" class="message"></div>
  </section>
</main>

<script src="./js/version.js?v=1102"></script>
<script type="module" src="./js/auth.js?v=1102"></script>
</body>
</html>
