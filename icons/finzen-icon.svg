<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#13151f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#07080f;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Borda dourada sutil -->
  <rect width="512" height="512" rx="112" fill="none" stroke="url(#gold)" stroke-width="8" opacity="0.4"/>

  <!-- Letras FZ centralizadas -->
  <text
    x="256" y="310"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="220"
    fill="url(#gold)"
    text-anchor="middle"
    letter-spacing="-8"
  >FZ</text>

  <!-- Linha dourada embaixo do texto -->
  <rect x="156" y="340" width="200" height="6" rx="3" fill="url(#gold)" opacity="0.8"/>

  <!-- Texto ASSESSOR PESSOAL -->
  <text
    x="256" y="400"
    font-family="Arial, sans-serif"
    font-weight="600"
    font-size="36"
    fill="#f59e0b"
    text-anchor="middle"
    letter-spacing="4"
    opacity="0.7"
  >ASSESSOR</text>

</svg>
