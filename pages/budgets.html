<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orçamento - FinZen</title>
<link rel="stylesheet" href="../css/base.css?v=1030">
<link rel="stylesheet" href="../css/layout.css?v=1030">
<link rel="stylesheet" href="../css/components.css?v=1030">
<link rel="stylesheet" href="../css/mobile.css?v=1030">
<link rel="stylesheet" href="../css/navigation.css?v=1100">
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#4b84f3">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">FinZen</div>
    <nav class="sidebar-nav"></nav>
  </aside>

  <main class="content">
    <header class="topbar">
      <div>
        <h1>Orçamento por Categoria</h1>
        <p id="userEmail" class="muted"></p>
      </div>
      <button type="button" class="btn btn-danger compact" id="btnLogout">Sair</button>
    </header>

    <!-- KPIs -->
    <section class="kpi-grid" style="margin-bottom:20px">
      <article class="kpi-card">
        <span>Total Planejado</span>
        <strong id="totalPlanejado">R$ 0,00</strong>
      </article>
      <article class="kpi-card">
        <span>Total Gasto</span>
        <strong id="totalGasto" class="negative">R$ 0,00</strong>
      </article>
      <article class="kpi-card">
        <span>Saldo Restante</span>
        <strong id="saldoRestante">R$ 0,00</strong>
      </article>
    </section>

    <!-- Filtro de mês -->
    <section class="panel" style="margin-bottom:16px">
      <div class="panel-header">
        <h2>Mês de referência</h2>
      </div>
      <div style="padding:16px 20px">
        <input type="month" id="mesReferencia" style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text)">
      </div>
    </section>

    <!-- Novo orçamento -->
    <section class="panel" style="margin-bottom:16px">
      <div class="panel-header"><h2>Adicionar orçamento</h2></div>
      <div class="form-grid" style="padding:16px 20px">
        <div class="form-group">
          <label>Categoria</label>
          <select id="categoriaOrcamento"><option value="">Carregando...</option></select>
        </div>
        <div class="form-group">
          <label>Valor planejado (R$)</label>
          <input type="number" id="valorPlanejado" placeholder="0,00" step="0.01" min="0">
        </div>
        <div class="form-group" style="display:flex;align-items:flex-end">
          <button id="btnSalvarOrcamento" class="btn btn-primary" style="width:100%">+ Adicionar</button>
        </div>
      </div>
      <div id="mensagemOrcamento" class="message" style="margin:0 20px 16px"></div>
    </section>

    <!-- Lista de orçamentos -->
    <section class="panel">
      <div class="panel-header"><h2>Orçamentos do mês</h2></div>
      <div id="listaOrcamentos" style="padding:0 20px 8px">
        <p class="muted" style="padding:16px 0">Carregando...</p>
      </div>
    </section>

  </main>
</div>

<nav class="mobile-nav"></nav>
<script type="module" src="../js/navigation.js?v=1100"></script>
<script type="module" src="../js/budgets.js?v=1030"></script>
</body>
</html>
