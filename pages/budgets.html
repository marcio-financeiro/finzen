<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orçamento - FinZen</title>

<link rel="stylesheet" href="../css/base.css?v=1010">
<link rel="stylesheet" href="../css/layout.css?v=1010">
<link rel="stylesheet" href="../css/components.css?v=1010">
<link rel="stylesheet" href="../css/mobile.css?v=1010">
<link rel="stylesheet" href="../css/navigation.css?v=1010">
</head>

<body>

<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-brand">FinZen</div>

    <nav class="sidebar-nav">
      <a href="./dashboard.html">Dashboard</a>
      <a href="./accounts.html">Contas</a>
      <a href="./categories.html">Categorias</a>
      <a href="./transactions.html">Lançamentos</a>
      <a href="./cards.html">Cartões</a>
      <a href="./card-purchases.html">Compras no Cartão</a>
      <a href="./card-bills.html">Faturas</a>
      <a class="active" href="./budgets.html">Orçamento</a>
      <a href="./investments.html">Investimentos</a>
    </nav>
  </aside>

  <main class="content">

    <header class="topbar">
      <div>
        <h1>Orçamento</h1>
        <p id="userEmail" class="muted"></p>
      </div>

      <button type="button" class="btn btn-danger compact" id="btnLogout">Sair</button>
    </header>

    <section class="kpi-grid">
      <article class="kpi-card">
        <span>Total Planejado</span>
        <strong id="totalPlanejado">R$ 0,00</strong>
      </article>

      <article class="kpi-card">
        <span>Total Gasto</span>
        <strong id="totalGasto" class="negative">R$ 0,00</strong>
      </article>

      <article class="kpi-card">
        <span>Saldo Restante</span>
        <strong id="saldoRestante">R$ 0,00</strong>
      </article>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Novo Orçamento</h2>
      </div>

      <div class="form-grid">

        <div class="form-group">
          <label for="mesReferencia">Mês de referência</label>
          <input type="month" id="mesReferencia">
        </div>

        <div class="form-group">
          <label for="categoriaOrcamento">Categoria</label>
          <select id="categoriaOrcamento">
            <option value="">Carregando categorias...</option>
          </select>
        </div>

        <div class="form-group">
          <label for="valorPlanejado">Valor planejado</label>
          <input type="number" id="valorPlanejado" placeholder="0,00" step="0.01">
        </div>

      </div>

      <button type="button" class="btn btn-primary" id="btnSalvarOrcamento">Salvar Orçamento</button>

      <div id="mensagemOrcamento" class="message"></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Orçamento do Mês</h2>
      </div>

      <div id="listaOrcamentos" class="table-wrap"></div>
    </section>

  </main>

</div>

<nav class="mobile-nav">
  <a href="./dashboard.html">Início</a>
  <a href="./transactions.html">Lançar</a>
  <a href="./card-bills.html">Faturas</a>
  <a class="active" href="./budgets.html">Orçamento</a>
</nav>

<script type="module" src="../js/navigation.js?v=1010"></script>
<script type="module" src="../js/budgets.js?v=1010"></script>

</body>
</html>
