<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>if(localStorage.getItem("finzen_sidebar_rail")==="collapsed")document.documentElement.classList.add("sidebar-rail");</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chat IA - Vyn</title>
<link rel="stylesheet" href="../css/variables.css?v=1200">
<link rel="stylesheet" href="../css/base.css?v=1200">
<link rel="stylesheet" href="../css/layout.css?v=1200">
<link rel="stylesheet" href="../css/components.css?v=1200">
<link rel="stylesheet" href="../css/mobile.css?v=1200">
<link rel="stylesheet" href="../css/navigation.css?v=1200">
<link rel="stylesheet" href="../css/editorial.css?v=1200">
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#c08a3e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
/* ── Layout do chat ── */
.chat-shell {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 60px); /* descontar topbar */
  max-height: calc(100vh - 60px);
}

/* ── Status de contexto ── */
.chat-status {
  padding: 8px 20px;
  font-size: 12px;
  color: var(--muted);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

/* ── Sugestões rápidas ── */
.chat-suggestions {
  display: flex;
  gap: 8px;
  padding: 10px 16px;
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.chat-suggestions::-webkit-scrollbar { display: none; }

.chat-chip {
  white-space: nowrap;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  border: 1px solid var(--border);
  background: var(--surface-2, rgba(255,255,255,.04));
  color: var(--muted);
  cursor: pointer;
  transition: border-color .15s, color .15s, background .15s;
  flex-shrink: 0;
}
.chat-chip:hover {
  border-color: var(--accent);
  color: var(--text);
  background: rgba(79,124,255,.08);
}

/* ── Área de mensagens ── */
#mensagens {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  scroll-behavior: smooth;
}

/* ── Empty state ── */
.chat-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 10px;
  color: var(--muted);
  padding: 40px 20px;
  margin: auto;
}
.chat-empty-icon { color: var(--muted); }
.chat-empty h3 { font-size: 16px; font-weight: 700; color: var(--text); }
.chat-empty p { font-size: 13px; line-height: 1.6; max-width: 280px; }

/* ── Mensagens ── */
.chat-msg {
  display: flex;
  gap: 10px;
  max-width: 100%;
  animation: fadeUp .2s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.chat-msg-user { flex-direction: row-reverse; }

.chat-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.chat-msg-ai   .chat-avatar { background: linear-gradient(135deg, #f59e0b, #fbbf24); }
.chat-msg-user .chat-avatar { background: var(--surface-2, rgba(255,255,255,.06)); border: 1px solid var(--border); }

.chat-bubble {
  max-width: calc(100% - 80px);
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 13px;
  line-height: 1.65;
}
.chat-msg-ai   .chat-bubble {
  background: var(--surface-2, rgba(255,255,255,.04));
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
  color: var(--text);
}
.chat-msg-user .chat-bubble {
  background: rgba(79,124,255,.15);
  border: 1px solid rgba(79,124,255,.25);
  border-top-right-radius: 4px;
  color: var(--text);
}

/* Markdown dentro das bolhas */
.chat-bubble strong { font-weight: 700; }
.chat-bubble h4 { font-size: 13px; font-weight: 700; margin: 10px 0 5px; }
.chat-bubble h4:first-child { margin-top: 0; }
.chat-bubble ul { padding-left: 16px; margin: 5px 0; display: flex; flex-direction: column; gap: 3px; }
.chat-bubble p  { margin: 4px 0; }

/* Cursor piscante */
.chat-cursor {
  display: inline-block;
  width: 2px; height: 13px;
  background: var(--accent);
  margin-left: 2px;
  vertical-align: middle;
  animation: blink .7s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* Indicador de digitação */
.chat-dots { display: flex; gap: 4px; align-items: center; padding: 3px 0; }
.chat-dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  animation: dot 1.2s ease-in-out infinite;
}
.chat-dots span:nth-child(2) { animation-delay: .2s; }
.chat-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes dot { 0%,80%,100%{transform:scale(.7);opacity:.4} 40%{transform:scale(1);opacity:1} }

/* ── Input area ── */
.chat-input-area {
  padding: 10px 14px 14px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.chat-input-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: var(--surface-2, rgba(255,255,255,.04));
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 8px 12px;
  transition: border-color .2s;
}
.chat-input-row:focus-within { border-color: var(--accent); }

#inputMsg {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  resize: none;
  max-height: 120px;
  line-height: 1.5;
}
#inputMsg::placeholder { color: var(--muted); }
#inputMsg:disabled { opacity: .5; }

#btnEnviar {
  width: 34px; height: 34px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 15px;
  transition: opacity .15s, transform .1s;
}
#btnEnviar:hover:not(:disabled) { opacity: .85; }
#btnEnviar:active:not(:disabled) { transform: scale(.94); }
#btnEnviar:disabled { opacity: .3; cursor: not-allowed; }

.chat-hint {
  font-size: 11px;
  color: var(--muted);
  text-align: center;
  margin-top: 6px;
}

/* Mobile: ocupar tela inteira */
@media(max-width: 768px) {
  .chat-shell { height: calc(100dvh - 120px); }
  .chat-bubble { max-width: calc(100% - 50px); }
}

/* Esconder FAB na página de chat para não sobrepor botão Enviar */
.finzen-fab-wrap { display: none !important; }
</style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">Vyn</div>
    <nav class="sidebar-nav"></nav>
  </aside>

  <main class="content" style="padding:0;display:flex;flex-direction:column;overflow:hidden">

    <header class="topbar" style="flex-shrink:0">
      <div>
        <h1><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:6px"><path d="M4 5h16a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H9l-4 4v-4H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1z"/></svg>Chat com IA</h1>
        <p id="userEmail" class="muted"></p>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button onclick="limparChat()" class="btn btn-secondary compact" title="Limpar conversa"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><path d="M4 7h16"/><path d="M10 11v6M14 11v6"/><path d="M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13"/><path d="M9 7V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v3"/></svg>Limpar</button>
        <button type="button" class="btn btn-danger compact" id="btnLogout">Sair</button>
      </div>
    </header>

    <!-- Status do contexto -->
    <div class="chat-status">
      <span id="statusContexto">⏳ Carregando dados financeiros...</span>
      <span style="font-size:11px;color:var(--muted)">Histórico: últimas 10 trocas</span>
    </div>

    <!-- Sugestões rápidas -->
    <div class="chat-suggestions">
      <button class="chat-chip" onclick="usarSugestao('Como foram meus gastos esse mês?')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><line x1="3" y1="20" x2="21" y2="20"/><line x1="6" y1="20" x2="6" y2="13"/><line x1="12" y1="20" x2="12" y2="8"/><line x1="18" y1="20" x2="18" y2="4"/></svg>Gastos do mês</button>
      <button class="chat-chip" onclick="usarSugestao('Quanto tenho de fatura de cartão aberta?')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><rect x="2.5" y="6" width="19" height="13" rx="2.5"/><path d="M2.5 10.5h19"/></svg>Faturas abertas</button>
      <button class="chat-chip" onclick="usarSugestao('Onde posso economizar esse mês?')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><path d="M9 18h6M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.2 1 2.05V17h6v-2.25c0-.85.4-1.55 1-2.05A7 7 0 0 0 12 2z"/></svg>Onde economizar</button>
      <button class="chat-chip" onclick="usarSugestao('Como está minha taxa de poupança?')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M3 10h18"/><circle cx="16" cy="14.5" r="1.2" fill="currentColor" stroke="none"/></svg>Taxa de poupança</button>
      <button class="chat-chip" onclick="usarSugestao('Vou fechar o mês no azul ou no vermelho?')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><path d="M12 3c.6 2.8 1.8 4.6 4 5.5-2.2.9-3.4 2.7-4 5.5-.6-2.8-1.8-4.6-4-5.5 2.2-.9 3.4-2.7 4-5.5z"/></svg>Previsão do mês</button>
      <button class="chat-chip" onclick="usarSugestao('Quais são minhas maiores despesas por categoria?')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><polyline points="3,17 9,11 13,15 21,6"/><polyline points="15,6 21,6 21,12"/></svg>Top categorias</button>
      <button class="chat-chip" onclick="usarSugestao('Tenho algum lançamento pendente essa semana?')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><circle cx="12" cy="12" r="9"/><polyline points="12,7 12,12 15,14"/></svg>Pendentes</button>
    </div>

    <!-- Mensagens -->
    <div id="mensagens">
      <div id="emptyState" class="chat-empty">
        <div class="chat-empty-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H9l-4 4v-4H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1z"/></svg></div>
        <h3>Olá! Sou o Vyn AI</h3>
        <p>Tenho acesso aos seus dados financeiros reais. Pergunte o que quiser sobre gastos, receitas, cartões, metas e muito mais.</p>
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input-area">
      <div class="chat-input-row">
        <textarea
          id="inputMsg"
          placeholder="Carregando dados..."
          rows="1"
          disabled
        ></textarea>
        <button id="btnEnviar" disabled title="Enviar (Enter)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg></button>
      </div>
      <p class="chat-hint">Enter para enviar · Shift+Enter para nova linha</p>
    </div>

  </main>
</div>

<nav class="mobile-nav"></nav>
<script src="../js/version.js"></script>
<script type="module" src="../js/navigation.js"></script>
<script type="module" src="../js/chat.js"></script>
</body>
</html>
