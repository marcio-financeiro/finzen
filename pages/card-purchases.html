<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>if(localStorage.getItem("finzen_sidebar_rail")==="collapsed")document.documentElement.classList.add("sidebar-rail");</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compras no Cartão - FinZen</title>
<link rel="stylesheet" href="../css/base.css?v=1107">
<link rel="stylesheet" href="../css/layout.css?v=1107">
<link rel="stylesheet" href="../css/components.css?v=1107">
<link rel="stylesheet" href="../css/mobile.css?v=1107">
<link rel="stylesheet" href="../css/navigation.css?v=1107">
<link rel="stylesheet" href="../css/editorial.css?v=1107">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">FinZen</div>
    <nav class="sidebar-nav">
      <a href="./dashboard.html">Dashboard</a>
      <a href="./accounts.html">Contas</a>
      <a href="./categories.html">Categorias</a>
      <a href="./transactions.html">Lançamentos</a>
      <a href="./cards.html">Cartões</a>
      <a class="active" href="./card-purchases.html">Compras no Cartão</a>
      <a href="./budgets.html">Orçamento</a>
      <a href="./investments.html">Investimentos</a>
    </nav>
  </aside>

  <main class="content">
    <header class="topbar">
      <div>
        <h1>Compras no Cartão</h1>
        <p id="userEmail" class="muted"></p>
      </div>
      <button type="button" class="btn btn-danger compact" id="btnLogout">Sair</button>
    </header>

    <section class="panel">
      <div class="panel-header"><h2>Nova Compra</h2></div>
      <div class="form-grid">
        <div class="form-group">
          <label for="cartaoCompra">Cartão</label>
          <select id="cartaoCompra"><option value="">Carregando cartões...</option></select>
        </div>
        <div class="form-group">
          <label for="categoriaCompra">Categoria</label>
          <select id="categoriaCompra"><option value="">Carregando categorias...</option></select>
        </div>
        <div class="form-group">
          <label for="descricaoCompra">Descrição</label>
          <input type="text" id="descricaoCompra" placeholder="Ex: Mercado, notebook, farmácia">
        </div>
        <div class="form-group">
          <label for="valorCompra">Valor total</label>
          <input type="number" id="valorCompra" placeholder="0,00" step="0.01" inputmode="decimal">
        </div>
        <div class="form-group">
          <label for="parcelasCompra">Parcelas</label>
          <input type="number" id="parcelasCompra" value="1" min="1" max="60" inputmode="numeric">
        </div>
        <div class="form-group">
          <label for="dataCompra">Data da compra</label>
          <input type="date" id="dataCompra">
        </div>
      </div>
      <button type="button" class="btn btn-primary" id="btnSalvarCompra">Salvar Compra</button>
      <div id="mensagemCompra" class="message"></div>
    </section>

    <section class="panel">
      <div class="panel-header"><h2>Compras Registradas</h2></div>
      <div id="listaCompras" class="table-wrap"></div>
    </section>
  </main>
</div>

<nav class="mobile-nav">
  <a href="./dashboard.html">Início</a>
  <a href="./cards.html">Cartões</a>
  <a class="active" href="./card-purchases.html">Compras</a>
  <a href="./transactions.html">Lançar</a>
</nav>

<script src="../js/version.js?v=1107"></script>
<script type="module" src="../js/navigation.js?v=1107"></script>
<script type="module" src="../js/cardPurchases.js?v=1107"></script>
</body>
</html>
