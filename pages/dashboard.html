<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - FinZen</title>

<link rel="stylesheet" href="../css/base.css?v=1000">
<link rel="stylesheet" href="../css/layout.css?v=1000">
<link rel="stylesheet" href="../css/components.css?v=1000">
<link rel="stylesheet" href="../css/mobile.css?v=1000">
<link rel="stylesheet" href="../css/navigation.css?v=1000">
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#4b84f3">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FinZen">
<link rel="apple-touch-icon" href="../icons/icon-192.png">
</head>

<body>

<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-brand">FinZen</div>

    <nav class="sidebar-nav"></nav>
  </aside>

  <main class="content">

    <header class="topbar">
      <div>
        <h1>Dashboard</h1>
        <p id="userEmail" class="muted"></p>
      </div>

      <button type="button" class="btn btn-danger compact" id="btnLogout">Sair</button>
    </header>

    <section class="kpi-grid">

      <article class="kpi-card kpi-clickable" onclick="location.href='./movements.html'">
        <span>Saldo total em contas</span>
        <strong id="saldoTotal">R$ 0,00</strong>
      </article>

      <article class="kpi-card kpi-clickable" onclick="location.href='./movements.html?tipo=receita'">
        <span>Receitas do mês</span>
        <strong id="receitasMes" class="positive">R$ 0,00</strong>
      </article>

      <article class="kpi-card kpi-clickable" onclick="location.href='./movements.html?tipo=despesa'">
        <span>Despesas do mês</span>
        <strong id="despesasMes" class="negative">R$ 0,00</strong>
      </article>

      <article class="kpi-card kpi-clickable" onclick="location.href='./movements.html'">
        <span>Resultado do mês</span>
        <strong id="resultadoMes">R$ 0,00</strong>
      </article>

      <article class="kpi-card kpi-clickable" onclick="location.href='./card-bills.html'">
        <span>Faturas abertas (mês atual)</span>
        <strong id="faturasAbertas" class="negative">R$ 0,00</strong>
      </article>

    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Últimos Lançamentos</h2>
        <a href="./movements.html" class="btn btn-secondary compact">Ver todos</a>
      </div>

      <div id="ultimosLancamentos" class="table-wrap"></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Resumo por Conta</h2>
      </div>

      <div id="resumoContas" class="table-wrap"></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Faturas do Mês Atual</h2>
        <a href="./card-bills.html" class="btn btn-secondary compact">Ver todas</a>
      </div>

      <div id="resumoFaturas" class="table-wrap"></div>
    </section>

  </main>

</div>

<nav class="mobile-nav"></nav>

<script type="module" src="../js/navigation.js?v=1000"></script>
<script type="module" src="../js/dashboard.js?v=1000"></script>

</body>
</html>
