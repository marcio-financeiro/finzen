<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>if(localStorage.getItem("finzen_sidebar_rail")==="collapsed")document.documentElement.classList.add("sidebar-rail");</script>
<meta charset="UTF-8">
<style>html,body{background:#07080f}</style>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Movimentações de Investimentos - Vyn</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,400..700&display=swap">
<link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm">
<link rel="stylesheet" href="../css/variables.css?v=1200">
<link rel="stylesheet" href="../css/base.css?v=1200">
<link rel="stylesheet" href="../css/layout.css?v=1200">
<link rel="stylesheet" href="../css/components.css?v=1200">
<link rel="stylesheet" href="../css/mobile.css?v=1200">
<link rel="stylesheet" href="../css/navigation.css?v=1200">
<link rel="stylesheet" href="../css/editorial.css?v=1200">
</head>

<body>

<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-brand">Vyn</div>

    <nav class="sidebar-nav">
      <a href="./dashboard.html">Dashboard</a>
      <a href="./registrations.html?tab=contas">Contas</a>
      <a href="./registrations.html?tab=categorias">Categorias</a>
      <a href="./transactions.html">Lançamentos</a>
      <a href="./registrations.html?tab=cartoes">Cartões</a>
      <a href="./movements.html?tipo=cartao">Compras no Cartão</a>
      <a href="./card-bills.html">Faturas</a>
      <a href="./budgets.html">Orçamento</a>
      <a href="./goals.html">Metas</a>
      <a href="./investments.html">Investimentos</a>
      <a class="active" href="./asset-transactions.html">Movimentações</a>
    </nav>
  </aside>

  <main class="content">

    <header class="topbar">
      <div>
        <h1>Movimentações de Investimentos</h1>
        <p id="userEmail" class="muted"></p>
      </div>

      <button type="button" class="btn btn-danger compact" id="btnLogout">Sair</button>
    </header>

    <section class="panel">
      <div class="panel-header">
        <h2>Nova Movimentação</h2>
      </div>

      <div class="form-grid">

        <div class="form-group">
          <label for="ativoMovimento">Ativo</label>
          <select id="ativoMovimento">
            <option value="">Carregando ativos...</option>
          </select>
        </div>

        <div class="form-group">
          <label for="tipoMovimento">Tipo</label>
          <select id="tipoMovimento">
            <option value="">Selecione</option>
            <option value="compra">Compra</option>
            <option value="venda">Venda</option>
            <option value="dividendo">Dividendo</option>
            <option value="jcp">JCP</option>
            <option value="rendimento_fii">Rendimento FII</option>
            <option value="aporte">Aporte</option>
          </select>
        </div>

        <div class="form-group">
          <label for="quantidadeMovimento">Quantidade</label>
          <input type="number" id="quantidadeMovimento" placeholder="0" step="0.000001" inputmode="decimal">
        </div>

        <div class="form-group">
          <label for="precoMovimento">Preço unitário</label>
          <input type="number" id="precoMovimento" placeholder="0,00" step="0.000001" inputmode="decimal">
        </div>

        <div class="form-group">
          <label for="valorTotalMovimento">Valor total</label>
          <input type="text" id="valorTotalMovimento" placeholder="0,00" inputmode="decimal">
        </div>

        <div class="form-group">
          <label for="dataMovimento">Data</label>
          <input type="date" id="dataMovimento">
        </div>

        <div class="form-group">
          <label for="observacaoMovimento">Observação</label>
          <input type="text" id="observacaoMovimento" placeholder="Opcional">
        </div>

      </div>

      <button type="button" class="btn btn-primary" id="btnSalvarMovimento">Salvar Movimentação</button>

      <div id="mensagemMovimento" class="message"></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Histórico</h2>
      </div>

      <div id="listaMovimentos" class="table-wrap"></div>
    </section>

  </main>

</div>

<nav class="mobile-nav">
  <a href="./dashboard.html">Início</a>
  <a href="./investments.html">Carteira</a>
  <a class="active" href="./asset-transactions.html">Mov.</a>
  <a href="./transactions.html">Lançar</a>
</nav>

<script src="../js/version.js"></script>
<script type="module" src="../js/navigation.js"></script>
<script type="module" src="../js/assetTransactions.js"></script>

</body>
</html>
