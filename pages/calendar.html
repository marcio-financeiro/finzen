<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>if(localStorage.getItem("finzen_sidebar_rail")==="collapsed")document.documentElement.classList.add("sidebar-rail");</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário - FinZen</title>
<link rel="stylesheet" href="../css/base.css?v=1107">
<link rel="stylesheet" href="../css/layout.css?v=1107">
<link rel="stylesheet" href="../css/components.css?v=1107">
<link rel="stylesheet" href="../css/mobile.css?v=1107">
<link rel="stylesheet" href="../css/navigation.css?v=1107">
<link rel="stylesheet" href="../css/editorial.css?v=1107">
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#f59e0b">
<style>

/* ── Toolbar ── */
.cal-toolbar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding:16px 20px;border-bottom:1px solid var(--border);
  background:var(--surface);
}
.cal-nav{display:flex;align-items:center;gap:8px;margin-right:auto;}
.cal-nav button{
  background:var(--surface-2);border:1px solid var(--border);
  color:var(--text);padding:6px 12px;border-radius:8px;cursor:pointer;
  font-size:13px;transition:background .15s;
}
.cal-nav button:hover{background:var(--surface-3);}
.cal-mes-label{font-size:16px;font-weight:800;min-width:160px;text-align:center;}
.cal-views{display:flex;gap:4px;}
.cal-view-btn{
  padding:6px 14px;border:1px solid var(--border);border-radius:8px;
  background:transparent;color:var(--muted);cursor:pointer;font-size:12px;
  font-weight:700;transition:all .15s;
}
.cal-view-btn.active{
  background:var(--accent);border-color:var(--accent);color:#fff;
}
.btn-novo-evento{
  padding:8px 16px;background:var(--accent);color:#fff;border:none;
  border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;
  display:flex;align-items:center;gap:6px;transition:opacity .15s;
}
.btn-novo-evento:hover{opacity:.88;}

/* ── Visão Mensal ── */
.cal-grid-header{
  display:grid;grid-template-columns:repeat(7,1fr);
  background:var(--surface-2);border-bottom:1px solid var(--border);
}
.cal-grid-header span{
  text-align:center;padding:10px 4px;font-size:11px;
  font-weight:700;color:var(--muted);text-transform:uppercase;
}
.cal-grid{
  display:grid;grid-template-columns:repeat(7,1fr);
  grid-auto-rows:minmax(90px,auto);border-left:1px solid var(--border);
}
.cal-cell{
  border-right:1px solid var(--border);border-bottom:1px solid var(--border);
  padding:6px;min-height:90px;cursor:pointer;transition:background .1s;
}
.cal-cell:hover{background:var(--surface-2);}
.cal-cell.outro-mes{opacity:.35;}
.cal-cell.hoje .cal-dia-num{
  background:var(--accent);color:#fff;
  border-radius:50%;width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;
}
.cal-dia-num{font-size:12px;font-weight:700;margin-bottom:4px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.cal-evento-pill{
  font-size:10px;padding:2px 6px;border-radius:4px;
  margin-bottom:2px;cursor:pointer;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;font-weight:600;
}
.cal-mais{font-size:10px;color:var(--muted);padding:2px 4px;}

/* ── Visão Semanal ── */
.cal-semana-grid{
  display:grid;grid-template-columns:60px repeat(7,1fr);
  border-left:1px solid var(--border);
}
.cal-semana-header{
  display:grid;grid-template-columns:60px repeat(7,1fr);
  background:var(--surface-2);border-bottom:1px solid var(--border);
}
.cal-semana-header-cell{
  text-align:center;padding:10px 4px;
  border-right:1px solid var(--border);
}
.cal-semana-header-cell .dia-nome{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;}
.cal-semana-header-cell .dia-num{font-size:18px;font-weight:900;}
.cal-semana-header-cell.hoje .dia-num{
  background:var(--accent);color:#fff;border-radius:50%;
  width:36px;height:36px;display:flex;align-items:center;
  justify-content:center;margin:0 auto;
}
.cal-hora-col{border-right:1px solid var(--border);}
.cal-hora-label{
  height:50px;display:flex;align-items:flex-start;
  justify-content:flex-end;padding:2px 6px 0;
  font-size:10px;color:var(--muted);border-bottom:1px solid var(--border);
}
.cal-semana-cell{
  border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
  height:50px;padding:2px;cursor:pointer;
  position:relative;transition:background .1s;
}
.cal-semana-cell:hover{background:var(--surface-2);}

/* ── Visão Lista ── */
.cal-lista{padding:16px 20px;}
.cal-lista-grupo{margin-bottom:20px;}
.cal-lista-data{
  font-size:11px;font-weight:800;color:var(--muted);
  text-transform:uppercase;letter-spacing:.06em;
  padding:0 0 8px;border-bottom:1px solid var(--border);
  margin-bottom:8px;
}
.cal-lista-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:10px 12px;background:var(--surface);
  border:1px solid var(--border);border-radius:10px;
  margin-bottom:6px;cursor:pointer;transition:border-color .15s;
}
.cal-lista-item:hover{border-color:var(--accent);}
.cal-lista-icon{font-size:20px;flex-shrink:0;margin-top:2px;}
.cal-lista-info{flex:1;}
.cal-lista-titulo{font-size:13px;font-weight:800;}
.cal-lista-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.cal-lista-status{flex-shrink:0;}

/* ── Modal de Evento ── */
.cal-modal-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9990;
  animation:calFade .15s ease;
}
.cal-modal{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:9991;background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:24px;width:90%;max-width:520px;
  max-height:90vh;overflow-y:auto;
  box-shadow:0 24px 64px rgba(0,0,0,.5);
  animation:calSlide .18s ease;
}
@keyframes calFade  {from{opacity:0}to{opacity:1}}
@keyframes calSlide {from{opacity:0;transform:translate(-50%,-46%)}to{opacity:1;transform:translate(-50%,-50%)}}

.cal-modal h2{font-size:16px;font-weight:800;margin:0 0 20px;}
.cal-modal-actions{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;}

/* Cores por tipo */
.tipo-financeiro  {background:rgba(75,132,243,.2); color:#4b84f3;}
.tipo-tarefa      {background:rgba(30,200,106,.2);  color:#1ec86a;}
.tipo-saude       {background:rgba(240,78,78,.2);   color:#f04e4e;}
.tipo-offshore    {background:rgba(245,166,35,.2);  color:#f5a623;}
.tipo-manutencao  {background:rgba(106,176,76,.2);  color:#6ab04c;}
.tipo-documento   {background:rgba(123,92,229,.2);  color:#7b5ce5;}
.tipo-compromisso {background:rgba(34,211,238,.2);  color:#22d3ee;}

/* Status badge */
.status-pendente  {background:rgba(245,166,35,.15);color:var(--warning);}
.status-concluido {background:rgba(30,200,106,.15);color:var(--success);}
.status-cancelado {background:rgba(107,112,148,.15);color:var(--muted);}

@media(max-width:820px){
  .cal-grid{grid-auto-rows:minmax(70px,auto);}
  .cal-cell{padding:4px;}
  .cal-evento-pill{
    display:block;
    width:12px;height:12px;border-radius:50%;
    background:var(--pill-cor) !important;
    padding:0;margin:2px auto;
    font-size:0;line-height:0;
    overflow:hidden;
    border-left:none !important;
    position:relative;
    cursor:pointer;
  }
  .cal-evento-pill::after{
    content:'';
    position:absolute;
    inset:-8px;
  }
  .cal-mais{font-size:9px;text-align:center;}
}
</style>
</head>
<body>
<div class="app-layout">
  <div id="navContainer"></div>
  <main class="content">

    <section class="panel" style="margin:20px;padding:0;overflow:hidden;">

      <!-- Header -->
      <div style="padding:20px 20px 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
        <div>
          <h1 style="margin:0;font-size:22px;">📅 Calendário</h1>
          <p id="userEmail" class="muted" style="margin:2px 0 0;font-size:12px;"></p>
        </div>
        <button type="button" class="btn btn-secondary compact" id="btnVoltar">← Dashboard</button>
      </div>

      <!-- Toolbar -->
      <div class="cal-toolbar">
        <div class="cal-nav">
          <button id="btnAnterior">‹</button>
          <span class="cal-mes-label" id="calLabel">—</span>
          <button id="btnProximo">›</button>
          <button id="btnHoje" style="font-size:11px;">Hoje</button>
        </div>
        <div class="cal-views">
          <button class="cal-view-btn active" data-view="mensal">Mensal</button>
          <button class="cal-view-btn" data-view="semanal">Semanal</button>
          <button class="cal-view-btn" data-view="lista">Lista</button>
        </div>
        <button class="btn-novo-evento" id="btnNovoEvento">+ Novo evento</button>
        <button class="btn btn-secondary compact" id="btnExportarMes" title="Exportar mês para iPhone">📱 Exportar mês</button>
      </div>

      <!-- Corpo do calendário -->
      <div id="calBody" style="min-height:400px;"></div>

    </section>

  </main>
</div>

<!-- Modal de evento -->
<div id="calModalEvento" style="display:none;">
  <div class="cal-modal-backdrop" id="calModalBackdrop"></div>
  <div class="cal-modal">
    <h2 id="calModalTitulo">Novo Evento</h2>

    <div class="form-group">
      <label>Título *</label>
      <input type="text" id="evTitulo" placeholder="Ex: Consulta médica, Embarque...">
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group">
        <label>Tipo *</label>
        <select id="evTipo">
          <option value="compromisso">🎯 Compromisso</option>
          <option value="tarefa">📋 Tarefa</option>
          <option value="financeiro">💰 Financeiro</option>
          <option value="saude">🏥 Saúde</option>
          <option value="offshore">⚓ Offshore</option>
          <option value="manutencao">🔧 Manutenção</option>
          <option value="documento">📄 Documento</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="evStatus">
          <option value="pendente">Pendente</option>
          <option value="concluido">Concluído</option>
          <option value="cancelado">Cancelado</option>
        </select>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
      <div class="form-group">
        <label>Data início *</label>
        <input type="date" id="evDataInicio">
      </div>
      <div class="form-group">
        <label>Data fim</label>
        <input type="date" id="evDataFim">
      </div>
      <div class="form-group">
        <label>Hora</label>
        <input type="time" id="evHora">
      </div>
    </div>

    <div class="form-group">
      <label>Local</label>
      <input type="text" id="evLocal" placeholder="Ex: Hospital, Plataforma P-51...">
    </div>

    <div class="form-group">
      <label>Descrição / Observações</label>
      <textarea id="evDescricao" rows="3" placeholder="Detalhes do evento..."></textarea>
    </div>

    <!-- Lembrete por e-mail -->
    <div style="background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <input type="checkbox" id="evNotifEmail" style="width:16px;height:16px;">
        <label for="evNotifEmail" style="margin:0;font-size:13px;font-weight:700;cursor:pointer;">
          📧 Lembrete por e-mail
        </label>
      </div>
      <div id="evNotifOpcoes" style="display:none;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div class="form-group" style="margin:0;">
            <label>Avisar quantos dias antes</label>
            <select id="evLembreteDias">
              <option value="0">No dia</option>
              <option value="1" selected>1 dia antes</option>
              <option value="3">3 dias antes</option>
              <option value="7">7 dias antes</option>
              <option value="15">15 dias antes</option>
              <option value="30">30 dias antes</option>
            </select>
          </div>
          <div class="form-group" style="margin:0;">
            <label>E-mail destino</label>
            <input type="email" id="evEmail" value="info.marcio@gmail.com">
          </div>
        </div>
      </div>
    </div>

    <!-- Exportar para iPhone -->
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
      <input type="checkbox" id="evIcsExport" style="width:16px;height:16px;">
      <label for="evIcsExport" style="margin:0;font-size:13px;font-weight:700;cursor:pointer;">
        📱 Exportar para iPhone (iCal)
      </label>
    </div>

    <div id="evMsg" class="message" style="min-height:0;"></div>

    <div class="cal-modal-actions">
      <button type="button" class="btn btn-primary" id="btnSalvarEvento">💾 Salvar</button>
      <button type="button" class="btn btn-secondary" id="btnCancelarEvento">Cancelar</button>
      <button type="button" class="btn btn-danger" id="btnExcluirEvento" style="display:none;margin-left:auto;">Excluir</button>
    </div>
  </div>
</div>

<script src="../js/version.js?v=1107"></script>
<script type="module" src="../js/navigation.js?v=1107"></script>
<script type="module" src="../js/calendar.js?v=1107"></script>
</body>
</html>
