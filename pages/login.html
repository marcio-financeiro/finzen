<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinZen — Assessor Pessoal</title>
<link rel="stylesheet" href="../css/base.css?v=1100">
<link rel="stylesheet" href="../css/components.css?v=1100">
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#f59e0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="../icons/icon-192.png">
<style>
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background:
      radial-gradient(ellipse 50% 60% at 15% 10%, rgba(245,158,11,.07) 0%, transparent 55%),
      radial-gradient(ellipse 40% 50% at 85% 90%, rgba(245,158,11,.05) 0%, transparent 55%),
      var(--app-bg);
  }

  .auth-card {
    width: 100%;
    max-width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    padding: 36px 32px 32px;
    box-shadow: var(--shadow-lg), 0 0 60px rgba(245,158,11,.06);
  }

  .brand { margin-bottom: 28px; }

  .tabs {
    display: flex;
    gap: 2px;
    background: var(--surface-2);
    border-radius: var(--radius-md);
    padding: 3px;
    margin-bottom: 20px;
  }

  .tab {
    flex: 1;
    padding: 8px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    border-radius: calc(var(--radius-md) - 2px);
    cursor: pointer;
    color: var(--muted);
    background: transparent;
    border: none;
    transition: all var(--duration);
  }

  .tab.active {
    background: var(--surface-3);
    color: var(--text);
    box-shadow: var(--shadow-sm);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; animation: fz-fade-in .2s var(--ease); }

  .divider-text {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--muted-2);
    font-size: 11px;
    margin: 16px 0;
  }

  .divider-text::before,
  .divider-text::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .footer-text {
    text-align: center;
    font-size: 11px;
    color: var(--muted-2);
    margin-top: 24px;
    line-height: 1.6;
  }

  #msgLogin { min-height: 0; margin-top: 8px; margin-bottom: 0; }
</style>
</head>
<body>

<div class="auth-card">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-name">FinZen</div>
    <div class="brand-line"></div>
    <div class="brand-sub">Assessor Pessoal</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tabLogin" onclick="trocarTab('login')">Entrar</button>
    <button class="tab" id="tabCadastro" onclick="trocarTab('cadastro')">Criar conta</button>
  </div>

  <!-- Login -->
  <div class="tab-content active" id="formLogin">
    <div class="form-group">
      <label for="emailInput">E-mail</label>
      <input type="email" id="emailInput" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="senhaInput">Senha</label>
      <input type="password" id="senhaInput" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary full" id="btnLogin" style="margin-top:4px;">Entrar</button>
  </div>

  <!-- Cadastro -->
  <div class="tab-content" id="formCadastro">
    <div class="form-group">
      <label for="emailCad">E-mail</label>
      <input type="email" id="emailCad" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="senhaCad">Senha</label>
      <input type="password" id="senhaCad" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
    </div>
    <button class="btn btn-primary full" id="btnCadastro" style="margin-top:4px;">Criar conta</button>
  </div>

  <div class="message" id="msgLogin" style="display:none;"></div>

  <p class="footer-text">
    FinZen — Assessor Pessoal<br>
    <span style="color:var(--muted-2);">Seus dados protegidos com RLS Supabase</span>
  </p>

</div>

<script type="module" src="../js/auth.js?v=1100"></script>
<script>
  function trocarTab(tab) {
    document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
    document.getElementById('tabCadastro').classList.toggle('active', tab === 'cadastro');
    document.getElementById('formLogin').classList.toggle('active', tab === 'login');
    document.getElementById('formCadastro').classList.toggle('active', tab === 'cadastro');
    document.getElementById('msgLogin').style.display = 'none';
  }
</script>
</body>
</html>
