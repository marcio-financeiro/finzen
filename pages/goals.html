<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>if(localStorage.getItem("finzen_sidebar_rail")==="collapsed")document.documentElement.classList.add("sidebar-rail");</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metas - FinZen</title>
<link rel="stylesheet" href="../css/base.css?v=1115">
<link rel="stylesheet" href="../css/layout.css?v=1115">
<link rel="stylesheet" href="../css/components.css?v=1115">
<link rel="stylesheet" href="../css/mobile.css?v=1115">
<link rel="stylesheet" href="../css/navigation.css?v=1115">
<link rel="stylesheet" href="../css/editorial.css?v=1115">
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#f59e0b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">FinZen</div>
    <nav class="sidebar-nav"></nav>
  </aside>

  <main class="content">
    <header class="topbar">
      <div><h1>Metas Financeiras</h1><p id="userEmail" class="muted"></p></div>
      <button type="button" class="btn btn-danger compact" id="btnLogout">Sair</button>
    </header>

    <!-- KPIs -->
    <section class="kpi-grid" style="margin-bottom:20px">
      <article class="kpi-card">
        <span>Total Alvo</span>
        <strong id="totalAlvo">R$ 0,00</strong>
      </article>
      <article class="kpi-card">
        <span>Total Acumulado</span>
        <strong id="totalAtual" class="positive">R$ 0,00</strong>
      </article>
      <article class="kpi-card">
        <span>Falta para concluir</span>
        <strong id="totalFaltante">R$ 0,00</strong>
      </article>
      <article class="kpi-card">
        <span>Saldo disponível</span>
        <strong id="saldoDisponivel" class="positive">R$ 0,00</strong>
      </article>
      <article class="kpi-card">
        <span>Sua poupança média</span>
        <strong id="mediaAporte" style="color:#f59e0b">R$ 0,00/mês</strong>
      </article>
    </section>

    <!-- Formulário -->
    <section class="panel" style="margin-bottom:16px">
      <div class="panel-header"><h2 id="tituloForm">Nova Meta</h2></div>
      <div class="form-grid" style="padding:16px 20px">
        <div class="form-group">
          <label>Nome da meta</label>
          <input type="text" id="nomeMeta" placeholder="Ex: Reserva de emergência">
        </div>
        <div class="form-group">
          <label>Categoria</label>
          <select id="categoriaMeta">
            <option value="geral">Geral</option>
            <option value="reserva">Reserva de emergência</option>
            <option value="viagem">Viagem</option>
            <option value="compra">Compra planejada</option>
            <option value="investimento">Investimento</option>
            <option value="aposentadoria">Aposentadoria</option>
          </select>
        </div>
        <div class="form-group">
          <label>Valor alvo (R$)</label>
          <input type="number" id="valorAlvo" placeholder="0,00" step="0.01" min="0" inputmode="decimal">
        </div>
        <div class="form-group">
          <label>Valor atual (R$)</label>
          <input type="number" id="valorAtual" placeholder="0,00" step="0.01" min="0" inputmode="decimal">
        </div>
        <div class="form-group">
          <label>Data alvo <span class="muted" style="font-size:11px">(opcional)</span></label>
          <input type="date" id="dataAlvo">
        </div>
        <div class="form-group">
          <label>Cor</label>
          <input type="color" id="corMeta" value="#22c55e">
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label>Descrição (opcional)</label>
          <input type="text" id="descricaoMeta" placeholder="Detalhes da meta">
        </div>
      </div>
      <div style="padding:0 20px 16px;display:flex;gap:8px">
        <button id="btnSalvarMeta" class="btn btn-primary">+ Salvar Meta</button>
        <button id="btnCancelarEdicao" class="btn btn-secondary" style="display:none">Cancelar</button>
      </div>
      <div id="mensagemMeta" class="message" style="margin:0 20px 16px"></div>
    </section>

    <!-- Lista de metas -->
    <section class="panel">
      <div class="panel-header"><h2>Minhas Metas</h2></div>
      <div id="listaMetas" style="padding:0 20px 8px">
        <p class="muted" style="padding:16px 0">Carregando...</p>
      </div>
    </section>

  </main>
</div>

<nav class="mobile-nav"></nav>
<script src="../js/version.js"></script>
<script type="module" src="../js/navigation.js?v=1115"></script>
<script type="module" src="../js/goals.js?v=1115"></script>
</body>
</html>
