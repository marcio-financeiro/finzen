<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metas - FinZen</title>
<link rel="stylesheet" href="../css/base.css?v=1010">
<link rel="stylesheet" href="../css/layout.css?v=1010">
<link rel="stylesheet" href="../css/components.css?v=1010">
<link rel="stylesheet" href="../css/mobile.css?v=1010">
<link rel="stylesheet" href="../css/navigation.css?v=1010">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">FinZen</div>
    <nav class="sidebar-nav">
      <a href="./dashboard.html">Dashboard</a>
      <a href="./accounts.html">Contas</a>
      <a href="./categories.html">Categorias</a>
      <a href="./transactions.html">Lançamentos</a>
      <a href="./cards.html">Cartões</a>
      <a href="./card-purchases.html">Compras no Cartão</a>
      <a href="./card-bills.html">Faturas</a>
      <a href="./budgets.html">Orçamento</a>
      <a class="active" href="./goals.html">Metas</a>
      <a href="./investments.html">Investimentos</a>
    </nav>
  </aside>

  <main class="content">
    <header class="topbar">
      <div>
        <h1>Metas Financeiras</h1>
        <p id="userEmail" class="muted"></p>
      </div>
      <button type="button" class="btn btn-danger compact" id="btnLogout">Sair</button>
    </header>

    <section class="kpi-grid">
      <article class="kpi-card"><span>Total Alvo</span><strong id="totalAlvo">R$ 0,00</strong></article>
      <article class="kpi-card"><span>Total Acumulado</span><strong id="totalAtual" class="positive">R$ 0,00</strong></article>
      <article class="kpi-card"><span>Falta para concluir</span><strong id="totalFaltante">R$ 0,00</strong></article>
    </section>

    <section class="panel">
      <div class="panel-header"><h2>Nova Meta</h2></div>
      <div class="form-grid">
        <div class="form-group">
          <label for="nomeMeta">Nome da meta</label>
          <input type="text" id="nomeMeta" placeholder="Ex: Reserva de emergência">
        </div>
        <div class="form-group">
          <label for="categoriaMeta">Categoria</label>
          <select id="categoriaMeta">
            <option value="geral">Geral</option>
            <option value="reserva">Reserva de emergência</option>
            <option value="viagem">Viagem</option>
            <option value="compra">Compra planejada</option>
            <option value="investimento">Investimento</option>
            <option value="aposentadoria">Aposentadoria</option>
          </select>
        </div>
        <div class="form-group">
          <label for="valorAlvo">Valor alvo</label>
          <input type="number" id="valorAlvo" placeholder="0,00" step="0.01">
        </div>
        <div class="form-group">
          <label for="valorAtual">Valor atual</label>
          <input type="number" id="valorAtual" placeholder="0,00" step="0.01">
        </div>
        <div class="form-group">
          <label for="dataAlvo">Data alvo</label>
          <input type="date" id="dataAlvo">
        </div>
        <div class="form-group">
          <label for="corMeta">Cor</label>
          <input type="color" id="corMeta" value="#22c55e">
        </div>
        <div class="form-group">
          <label for="descricaoMeta">Descrição</label>
          <input type="text" id="descricaoMeta" placeholder="Opcional">
        </div>
      </div>
      <button type="button" class="btn btn-primary" id="btnSalvarMeta">Salvar Meta</button>
      <div id="mensagemMeta" class="message"></div>
    </section>

    <section class="panel">
      <div class="panel-header"><h2>Minhas Metas</h2></div>
      <div id="listaMetas" class="table-wrap"></div>
    </section>
  </main>
</div>

<nav class="mobile-nav">
  <a href="./dashboard.html">Início</a>
  <a href="./transactions.html">Lançar</a>
  <a href="./budgets.html">Orçamento</a>
  <a class="active" href="./goals.html">Metas</a>
</nav>

<script type="module" src="../js/navigation.js?v=1010"></script>
<script type="module" src="../js/goals.js?v=1010"></script>
</body>
</html>
