<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>if(localStorage.getItem("finzen_sidebar_rail")==="collapsed")document.documentElement.classList.add("sidebar-rail");</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lançamentos - Vyn</title>

<link rel="stylesheet" href="../css/base.css?v=1200">
<link rel="stylesheet" href="../css/layout.css?v=1200">
<link rel="stylesheet" href="../css/components.css?v=1200">
<link rel="stylesheet" href="../css/mobile.css?v=1200">
<link rel="stylesheet" href="../css/navigation.css?v=1200">
<link rel="stylesheet" href="../css/editorial.css?v=1200">
</head>

<body>

<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-brand">Vyn</div>

    <nav class="sidebar-nav">
      <a href="./dashboard.html">Dashboard</a>
      <a href="./accounts.html">Contas</a>
      <a href="./categories.html">Categorias</a>
      <a class="active" href="./transactions.html">Lançamentos</a>
      <a href="./cards.html">Cartões</a>
      <a href="./budgets.html">Orçamento</a>
      <a href="./investments.html">Investimentos</a>
    </nav>
  </aside>

  <main class="content">

    <header class="topbar">
      <div>
        <p style="font-size:11px;color:var(--muted);margin:0 0 2px"><a href="./dashboard.html" style="color:var(--muted);text-decoration:none">Dashboard</a> › Lançamentos</p>
        <h1>Lançamentos</h1>
        <p id="userEmail" class="muted"></p>
      </div>

      <button type="button" class="btn btn-danger compact" id="btnLogout">Sair</button>
    </header>

    <section class="panel">
      <div class="panel-header">
        <h2>Novo Lançamento</h2>
      </div>

      <p style="font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.05em;margin:0 0 6px">O QUÊ</p>
      <div class="form-grid" style="margin-bottom:16px">

        <div class="form-group">
          <label for="tipoTransacao">Tipo</label>
          <select id="tipoTransacao">
            <option value="">Selecione</option>
            <option value="receita">Receita</option>
            <option value="despesa">Despesa</option>
          </select>
        </div>

        <div class="form-group">
          <label for="categoriaTransacao">Categoria</label>
          <select id="categoriaTransacao">
            <option value="">Carregando categorias...</option>
          </select>
        </div>

        <div class="form-group">
          <label for="descricaoTransacao">Descrição</label>
          <input type="text" id="descricaoTransacao" placeholder="Ex: Salário, mercado, gasolina" maxlength="80" autocomplete="off">
        </div>

      </div>

      <p style="font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.05em;margin:0 0 6px">QUANDO E QUANTO</p>
      <div class="form-grid">

        <div class="form-group">
          <label for="valorTransacao">Valor</label>
          <input type="number" id="valorTransacao" placeholder="0,00" step="0.01" inputmode="decimal">
        </div>

        <div class="form-group">
          <label for="dataTransacao">Data</label>
          <input type="date" id="dataTransacao">
        </div>

        <div class="form-group">
          <label for="contaTransacao">Conta</label>
          <select id="contaTransacao">
            <option value="">Carregando contas...</option>
          </select>
        </div>

        <div class="form-group">
          <label for="statusTransacao">Status</label>
          <select id="statusTransacao">
            <option value="pago">Pago / Confirmado</option>
            <option value="pendente">Pendente</option>
          </select>
        </div>

        <div class="form-group">
          <label for="observacaoTransacao">Observação</label>
          <input type="text" id="observacaoTransacao" placeholder="Opcional" maxlength="120">
        </div>

      </div>

      <button type="button" class="btn btn-primary" id="btnSalvarTransacao">Salvar Lançamento</button>

      <div id="mensagemTransacao" class="message"></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Últimos Lançamentos</h2>
      </div>

      <div id="listaTransacoes" class="table-wrap"></div>
    </section>

  </main>

</div>

<nav class="mobile-nav">
  <a href="./dashboard.html">Início</a>
  <a href="./accounts.html">Contas</a>
  <a href="./categories.html">Categorias</a>
  <a class="active" href="./transactions.html">Lançar</a>
</nav>

<script src="../js/version.js"></script>
<script type="module" src="../js/navigation.js"></script>
<script type="module" src="../js/transactions.js"></script>

</body>
</html>
