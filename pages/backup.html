<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>if(localStorage.getItem("finzen_sidebar_rail")==="collapsed")document.documentElement.classList.add("sidebar-rail");</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Backup - Vyn</title>
<link rel="stylesheet" href="../css/variables.css?v=1200">
<link rel="stylesheet" href="../css/base.css?v=1200">
<link rel="stylesheet" href="../css/layout.css?v=1200">
<link rel="stylesheet" href="../css/components.css?v=1200">
<link rel="stylesheet" href="../css/mobile.css?v=1200">
<link rel="stylesheet" href="../css/navigation.css?v=1200">
<link rel="stylesheet" href="../css/editorial.css?v=1200">
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#c08a3e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
.backup-options{
  display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;
}
@media(max-width:600px){ .backup-options{ grid-template-columns:1fr; } }
.backup-option{
  border:1px solid var(--border);border-radius:16px;padding:20px;
  background:var(--surface-2);text-align:center;
}
.backup-option h3{ font-size:14px;margin:10px 0 6px; }
.backup-option p{ font-size:12px;color:var(--muted);margin-bottom:14px; }
.backup-option .icon{ color:var(--accent); }
.backup-option .icon svg{ width:30px; height:30px; }
.drive-status{
  font-size:12px;color:var(--muted);margin-top:8px;min-height:18px;
}
</style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">Vyn</div>
    <nav class="sidebar-nav"></nav>
  </aside>

  <main class="content">
    <header class="topbar">
      <div>
        <h1>Backup</h1>
        <p id="ultimoBackupInfo" class="muted">Carregando...</p>
      </div>
      <a href="./restore.html" class="btn btn-secondary compact">↩ Restaurar</a>
    </header>

    <!-- Opções de backup -->
    <div class="backup-options">

      <div class="backup-option">
        <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v11"/><polyline points="8,10 12,14 16,10"/><path d="M4 15v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3"/></svg></div>
        <h3>Download local</h3>
        <p>Baixa um arquivo JSON para o seu dispositivo. Salve em local seguro.</p>
        <button id="btnBackupLocal" class="btn btn-primary" style="width:100%"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px"><path d="M12 3v11"/><polyline points="8,10 12,14 16,10"/><path d="M4 15v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3"/></svg>Baixar JSON</button>
      </div>

      <div class="backup-option">
        <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H8a5 5 0 1 1 1.3-9.8A6 6 0 0 1 21 11.5a4 4 0 0 1-3.5 7.5z"/></svg></div>
        <h3>Google Drive</h3>
        <p>Salva automaticamente na pasta <strong>FinZen Backups</strong> do seu Google Drive.</p>
        <button id="btnBackupDrive" class="btn btn-primary" style="width:100%;background:var(--surface-3);border:1px solid #4285f4;color:#4285f4">
          <svg style="width:16px;height:16px;vertical-align:middle;margin-right:6px" viewBox="0 0 48 48">
            <path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Salvar no Drive
        </button>
        <div id="driveStatus" class="drive-status"></div>
      </div>

    </div>

    <div id="backupMessage" class="message"></div>

    <!-- Ações alternativas (após gerar backup) -->
    <div id="backupActions" style="display:none;gap:8px;flex-wrap:wrap;margin-bottom:16px">
      <button id="btnShareText" class="btn btn-secondary compact"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="10.6" x2="15.4" y2="6.4"/><line x1="8.6" y1="13.4" x2="15.4" y2="17.6"/></svg>Compartilhar</button>
      <button id="btnCopyBackup" class="btn btn-secondary compact"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>Copiar JSON</button>
    </div>
    <textarea id="backupPreview"
      style="display:none;width:100%;min-height:140px;margin-bottom:16px;font-size:11px;font-family:monospace"
      readonly></textarea>

    <!-- Dados incluídos -->
    <section class="panel">
      <div class="panel-header"><h2>Dados incluídos no backup</h2></div>
      <div id="backupStats" style="padding:20px">
        <p class="muted">Carregando...</p>
      </div>
    </section>

  </main>
</div>

<nav class="mobile-nav"></nav>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async></script>
<script src="../js/version.js"></script>
<script type="module" src="../js/navigation.js"></script>
<script type="module" src="../js/backup.js"></script>
</body>
</html>
