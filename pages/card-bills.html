<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>if(localStorage.getItem("finzen_sidebar_rail")==="collapsed")document.documentElement.classList.add("sidebar-rail");</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faturas - Vyn</title>
<link rel="stylesheet" href="../css/base.css?v=1200">
<link rel="stylesheet" href="../css/layout.css?v=1200">
<link rel="stylesheet" href="../css/components.css?v=1200">
<link rel="stylesheet" href="../css/mobile.css?v=1200">
<link rel="stylesheet" href="../css/navigation.css?v=1200">
<link rel="stylesheet" href="../css/editorial.css?v=1200">
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#C9A968">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vyn">
<link rel="apple-touch-icon" href="../icons/icon-192.png">

<style>
  /* ── Fatura card ── */
  .bill-card{
    border:1px solid var(--border);
    border-radius:16px;
    overflow:hidden;
    margin-bottom:12px;
    background:var(--surface);
  }
  .bill-card.mes-atual{
    border-color:rgba(245,158,11,.5);
    box-shadow:0 0 0 1px rgba(245,158,11,.2);
  }
  .bill-card-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:14px 18px;
    cursor:pointer;
    user-select:none;
  }
  .bill-card-header:hover{ background:rgba(255,255,255,.025); }

  .bill-card-left{ display:flex; align-items:center; gap:12px; }
  .bill-badge-mes{
    padding:4px 10px;
    border-radius:999px;
    font-size:11px;
    font-weight:800;
    background:rgba(245,158,11,.15);
    color:var(--accent);
  }
  .bill-badge-mes.atual{
    background:var(--accent);
    color:#fff;
  }
  .bill-card-name{ font-weight:800; font-size:.95rem; }
  .bill-card-count{ color:var(--muted); font-size:.83rem; margin-top:2px; }

  .bill-card-right{ display:flex; align-items:center; gap:12px; flex-shrink:0; }
  .bill-total{ font-family:var(--font-mono); font-weight:800; color:var(--danger); }
  .bill-chevron{
    color:var(--muted);
    font-size:18px;
    transition:transform .2s ease;
    line-height:1;
  }
  .bill-card.open .bill-chevron{ transform:rotate(180deg); }

  /* ── Itens da fatura ── */
  .bill-items{
    display:none;
    border-top:1px solid var(--border);
  }
  .bill-card.open .bill-items{ display:block; }

  .bill-items-table{
    width:100%;
    border-collapse:collapse;
  }
  .bill-items-table th,
  .bill-items-table td{
    padding:10px 18px;
    text-align:left;
    font-size:13px;
    border-bottom:1px solid rgba(42,45,69,.5);
  }
  .bill-items-table th{
    background:var(--surface-2);
    color:var(--muted);
    font-size:11px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:.03em;
  }
  .bill-items-table tr:last-child td{ border-bottom:0; }

  /* ── Ação pagar ── */
  .bill-pay-bar{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 18px;
    border-top:1px solid var(--border);
    background:rgba(245,158,11,.04);
    flex-wrap:wrap;
  }
  .bill-pay-bar select{
    flex:1;
    min-width:160px;
    padding:9px 12px;
    font-size:13px;
  }
  .bill-pay-bar .btn{ flex-shrink:0; margin:0; }

  /* ── Seção futuros ── */
  .bills-section-title{
    font-size:11px;
    font-weight:800;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--muted);
    margin:24px 0 10px;
  }

  /* ── Filtro ── */
  .bills-filter{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
    padding:14px 18px;
  }
  .bills-filter select{
    width:auto;
    padding:9px 12px;
    font-size:13px;
  }

  @media(max-width:600px){
    .bill-card-header{ padding:12px 14px; gap:8px; }
    .bill-pay-bar{ padding:12px 14px; }
    .bill-items-table th,
    .bill-items-table td{ padding:9px 14px; }
  }
</style>
</head>

<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">Vyn</div>
    <nav class="sidebar-nav"></nav>
  </aside>

  <main class="content">
    <header class="topbar">
      <div>
        <h1>Faturas</h1>
        <p id="userEmail" class="muted"></p>
      </div>
      <button type="button" class="btn btn-danger compact" id="btnLogout">Sair</button>
    </header>

    <!-- Filtro de cartão -->
    <section class="panel">
      <div class="bills-filter">
        <label style="margin:0;color:var(--muted);font-size:12px;font-weight:700;white-space:nowrap">Filtrar cartão</label>
        <select id="filtroCartao">
          <option value="">Todos os cartões</option>
        </select>
      </div>
      <div id="mensagemFatura" class="message" style="padding:0 18px 14px"></div>
    </section>

    <!-- Faturas -->
    <div id="listaFaturas"></div>

  </main>
</div>

<!-- Modal editar lançamento de cartão -->
<div id="modalEditarItem" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:420px">
    <h3 style="margin:0 0 16px;font-size:1rem">Editar lançamento</h3>
    <div class="form-group">
      <label>Descrição</label>
      <input type="text" id="editDescricao" class="form-control">
    </div>
    <div class="form-group">
      <label>Valor da parcela (R$)</label>
      <input type="number" id="editValor" step="0.01" min="0" class="form-control">
    </div>
    <div class="form-group">
      <label>Categoria</label>
      <select id="editCategoria" class="form-control">
        <option value="">Sem categoria</option>
      </select>
    </div>
    <div class="form-group">
      <label>Data da compra</label>
      <input type="date" id="editDataCompra" class="form-control">
    </div>
    <div class="form-group">
      <label>Fatura (mês de referência)</label>
      <input type="month" id="editFaturaRef" class="form-control">
    </div>
    <div id="editAtualizarParcelas" style="display:none;margin-top:4px">
      <label style="font-size:13px;display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="editAtualizarTodasParcelas" checked>
        Atualizar também as parcelas futuras
      </label>
    </div>
    <div id="editMensagem" class="message" style="margin-top:8px"></div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button type="button" class="btn btn-primary" onclick="salvarEdicaoItem()">Salvar</button>
      <button type="button" class="btn" onclick="fecharModalItem()">Cancelar</button>
    </div>
  </div>
</div>

<script src="../js/version.js"></script>
<script type="module" src="../js/navigation.js"></script>
<script type="module" src="../js/cardBills.js"></script>
</body>
</html>
