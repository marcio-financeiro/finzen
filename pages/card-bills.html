<body>

<div class="app-shell">

  <aside class="sidebar">

    <nav class="sidebar-nav">
      <a href="./dashboard.html">Dashboard</a>
      <a href="./accounts.html">Contas</a>
      <a href="./categories.html">Categorias</a>

      <a href="./investments.html">Investimentos</a>
    </nav>

  <main class="content">

    <header class="topbar">
      <div>
        <h1>Faturas do Cartão</h1>
        <p id="userEmail" class="muted"></p>
      </div>

      <button type="button" class="btn btn-danger compact" id="btnLogout">Sair</button>
    </header>

    <section class="panel">
      <div class="panel-header">
        <h2>Filtros</h2>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label for="filtroCartao">Cartão</label>
          <select id="filtroCartao">
            <option value="">Todos os cartões</option>
          </select>
        </div>

        <div class="form-group">
          <label for="contaPagamento">Conta para pagamento</label>
          <select id="contaPagamento">
            <option value="">Selecione a conta ao pagar</option>
          </select>
        </div>
      </div>

      <div id="mensagemFatura" class="message"></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Faturas Abertas</h2>
      </div>

      <div id="listaFaturas" class="table-wrap"></div>
    </section>

  </main>

</div>

  <a href="./dashboard.html">Início</a>
