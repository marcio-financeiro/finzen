<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>if(localStorage.getItem("finzen_sidebar_rail")==="collapsed")document.documentElement.classList.add("sidebar-rail");</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics - FinZen</title>
<link rel="stylesheet" href="../css/base.css?v=1115">
<link rel="stylesheet" href="../css/layout.css?v=1115">
<link rel="stylesheet" href="../css/components.css?v=1115">
<link rel="stylesheet" href="../css/mobile.css?v=1115">
<link rel="stylesheet" href="../css/navigation.css?v=1115">
<link rel="stylesheet" href="../css/editorial.css?v=1115">
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#f59e0b">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ── KPIs ── */
.an-kpi-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}
@media(max-width:768px){ .an-kpi-grid{ grid-template-columns: repeat(2,1fr); } }

.an-kpi {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
}
.an-kpi span { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; }
.an-kpi strong { font-size: 18px; font-weight: 800; }

/* ── Grid de gráficos ── */
.an-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 20px;
}
@media(max-width:900px){ .an-grid{ grid-template-columns: 1fr; } }

.an-full { grid-column: 1 / -1; }

.an-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
}

.an-chart-wrap {
  position: relative;
  height: 260px;
}

/* ── Loading overlay ── */
#loadingOverlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,17,23,.7);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  color: #e8eaf0;
  font-size: 14px;
}
.an-spinner {
  width: 36px; height: 36px;
  border: 3px solid rgba(255,255,255,.15);
  border-top-color: #f59e0b;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to{ transform: rotate(360deg) } }

/* ── Sem dados ── */
.an-empty {
  display: none;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--muted);
  font-size: 13px;
  flex-direction: column;
  gap: 8px;
}
</style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">FinZen</div>
    <nav class="sidebar-nav"></nav>
  </aside>

  <main class="content">
    <header class="topbar">
      <div>
        <h1>📈 Analytics</h1>
        <p id="userEmail" class="muted"></p>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button onclick="location.reload()" class="btn btn-secondary compact">🔄 Atualizar</button>
        <button type="button" class="btn btn-danger compact" id="btnLogout">Sair</button>
      </div>
    </header>

    <!-- KPIs -->
    <div class="an-kpi-grid">
      <div class="an-kpi">
        <span>Receitas (6 meses)</span>
        <strong id="kpiReceitas" class="positive">R$ 0,00</strong>
      </div>
      <div class="an-kpi">
        <span>Despesas (6 meses)</span>
        <strong id="kpiDespesas" class="negative">R$ 0,00</strong>
      </div>
      <div class="an-kpi">
        <span>Saldo em contas</span>
        <strong id="kpiSaldo" class="positive">R$ 0,00</strong>
      </div>
      <div class="an-kpi">
        <span>Total investido</span>
        <strong id="kpiInvest" style="color:#f59e0b">R$ 0,00</strong>
      </div>
      <div class="an-kpi">
        <span>Poupança média</span>
        <strong id="kpiPoupanca" style="color:#8b5cf6">0%</strong>
      </div>
      <div class="an-kpi">
        <span>Maior gasto (mês)</span>
        <strong id="kpiMaiorGasto" style="font-size:13px">—</strong>
      </div>
    </div>

    <!-- Gráficos linha 1 -->
    <div class="an-grid">
      <div class="an-card an-full">
        <div class="an-chart-wrap" style="height:280px">
          <canvas id="chartRecDes"></canvas>
        </div>
      </div>

      <div class="an-card">
        <div class="an-chart-wrap">
          <canvas id="chartSaldo"></canvas>
        </div>
      </div>

      <div class="an-card">
        <div class="an-chart-wrap">
          <canvas id="chartPoupanca"></canvas>
        </div>
      </div>
    </div>

    <!-- Carteira por classe -->
    <div class="an-grid">
      <div class="an-card an-full">
        <div class="an-chart-wrap" style="height:300px">
          <canvas id="chartInvestimentos"></canvas>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- Loading -->
<div id="loadingOverlay">
  <div class="an-spinner"></div>
  <span>Carregando seus dados...</span>
</div>

<nav class="mobile-nav"></nav>
<script src="../js/version.js"></script>
<script type="module" src="../js/navigation.js"></script>
<script type="module" src="../js/analytics.js"></script>
</body>
</html>
