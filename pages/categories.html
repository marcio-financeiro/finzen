<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>if(localStorage.getItem("finzen_sidebar_rail")==="collapsed")document.documentElement.classList.add("sidebar-rail");</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Categorias - Vyn</title>
<link rel="stylesheet" href="../css/variables.css?v=1200">
<link rel="stylesheet" href="../css/base.css?v=1200">
<link rel="stylesheet" href="../css/layout.css?v=1200">
<link rel="stylesheet" href="../css/components.css?v=1200">
<link rel="stylesheet" href="../css/mobile.css?v=1200">
<link rel="stylesheet" href="../css/navigation.css?v=1200">
<link rel="stylesheet" href="../css/editorial.css?v=1200">
</head>

<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">Vyn</div>
    <nav class="sidebar-nav">
      <a href="./dashboard.html">Dashboard</a>
      <a href="./accounts.html">Contas</a>
      <a class="active" href="./categories.html">Categorias</a>
      <a href="./transactions.html">Lançamentos</a>
      <a href="./cards.html">Cartões</a>
      <a href="./budgets.html">Orçamento</a>
      <a href="./investments.html">Investimentos</a>
    </nav>
  </aside>

  <main class="content">
    <header class="topbar">
      <div>
        <h1>Categorias</h1>
        <p id="userEmail" class="muted"></p>
      </div>
      <button type="button" class="btn btn-danger compact" id="btnLogout">Sair</button>
    </header>

    <section class="panel">
      <div class="panel-header">
        <h2>Nova Categoria</h2>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label for="nomeCategoria">Nome da categoria</label>
          <input type="text" id="nomeCategoria" placeholder="Ex: Alimentação, Salário, Investimentos">
        </div>
        <div class="form-group">
          <label for="tipoCategoria">Tipo</label>
          <select id="tipoCategoria">
            <option value="">Selecione</option>
            <option value="receita">Receita</option>
            <option value="despesa">Despesa</option>
            <option value="investimento">Investimento</option>
            <option value="transferencia">Transferência</option>
          </select>
        </div>
        <div class="form-group">
          <label>Ícone</label>
          <div style="display:flex;gap:8px;align-items:center;">
            <div id="emojiPreview" style="font-size:28px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;
              border:1px solid var(--border);border-radius:10px;cursor:pointer;background:var(--surface-2);" title="Clique para escolher">
              😀
            </div>
            <input type="text" id="iconeCategoria" style="width:80px;" placeholder="ou cole"
              maxlength="4" title="Cole um emoji diretamente">
            <button type="button" id="btnEmojiPicker" class="btn btn-secondary compact">🙂 Escolher</button>
          </div>
          <div id="emojiPickerPanel" style="display:none;margin-top:8px;border:1px solid var(--border);
            border-radius:14px;padding:12px;background:var(--surface-2);max-height:220px;overflow-y:auto;">
            <div style="margin-bottom:8px;display:flex;gap:6px;flex-wrap:wrap;">
              <button type="button" class="emoji-cat-btn active" data-cat="common" style="font-size:12px;padding:3px 8px;border-radius:20px;border:1px solid var(--border);background:var(--accent);color:#fff;cursor:pointer;">Comuns</button>
              <button type="button" class="emoji-cat-btn" data-cat="money" style="font-size:12px;padding:3px 8px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;">Finanças</button>
              <button type="button" class="emoji-cat-btn" data-cat="food" style="font-size:12px;padding:3px 8px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;">Comida</button>
              <button type="button" class="emoji-cat-btn" data-cat="home" style="font-size:12px;padding:3px 8px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;">Casa/Vida</button>
              <button type="button" class="emoji-cat-btn" data-cat="transport" style="font-size:12px;padding:3px 8px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;">Transporte</button>
              <button type="button" class="emoji-cat-btn" data-cat="fun" style="font-size:12px;padding:3px 8px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;">Lazer</button>
            </div>
            <div id="emojiGrid" style="display:grid;grid-template-columns:repeat(auto-fill,36px);gap:4px;"></div>
          </div>
        </div>
        <div class="form-group">
          <label for="corCategoria">Cor</label>
          <input type="color" id="corCategoria" value="#4f8ef7">
        </div>
        <div class="form-group">
          <label for="orcamentoCategoria">Orçamento mensal</label>
          <input type="text" id="orcamentoCategoria" placeholder="0,00" inputmode="decimal">
        </div>
        <div class="form-group">
          <label for="statusCategoria">Status</label>
          <select id="statusCategoria">
            <option value="true">Ativa</option>
            <option value="false">Inativa</option>
          </select>
        </div>
      </div>

      <button type="button" class="btn btn-primary" id="btnSalvarCategoria">Salvar Categoria</button>
      <button type="button" class="btn btn-secondary" id="btnCriarPadrao">Criar categorias padrão</button>

      <div id="mensagemCategoria" class="message"></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Minhas Categorias</h2>
      </div>
      <div id="listaCategorias" class="table-wrap"></div>
    </section>
  </main>
</div>

<nav class="mobile-nav">
  <a href="./dashboard.html">Início</a>
  <a href="./accounts.html">Contas</a>
  <a class="active" href="./categories.html">Categorias</a>
  <a href="./transactions.html">Lançar</a>
</nav>

<script src="../js/version.js"></script>
<script type="module" src="../js/navigation.js"></script>
<script type="module" src="../js/categories.js"></script>
</body>
</html>
